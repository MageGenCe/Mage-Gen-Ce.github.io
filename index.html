<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign In</title>
</head>
<body style="background-color: rgb(255, 111, 111);">

    <center>
    <div style="width: 850px; height: 600px; background-color: rgb(255, 255, 255); border-radius: 20px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"> 
        <h1 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif; font-size: 400%; color: #000000;">Sign In</h1>
        <h3 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif; font-size: 200%; color: #1d1d1dc0; position: absolute; top: 15%; left: 30%;">Put Email and Password</h3>
        <input type="email" style="text-align: center; height: 40px; width: 265px; border-radius: 10px; background-color: lightgray; border: none; position: absolute; top: 35%; left: 34%;" placeholder="Email" required>
        <input type="password" style="text-align: center; width: 265px; height: 40px; border-radius: 10px; background-color: lightgray; border: none; position: absolute; top: 45%; left: 34%;" placeholder="Password" required>
        <a href="main.html">
        <button style="width: 268px; height: 40px; border-radius: 10px; background-color: rgb(255, 111, 111); border: none; position: absolute; top: 55%; left: 34%; cursor: pointer;">Sign In</button>
        </a>
    </div>
    </center>

</body>
</html>
